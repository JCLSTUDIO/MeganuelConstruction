<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Page Not Found | Meganuel Consortium</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a; color: #fff;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; text-align: center; padding: 20px;
        }
        h1 { font-family:'Playfair Display',serif; font-size:clamp(80px,15vw,180px); color:#c51b1b; line-height:1; font-weight:700; }
        h2 { font-family:'Playfair Display',serif; font-size:clamp(22px,3vw,36px); margin:10px 0 20px; font-weight:400; }
        p { color:rgba(255,255,255,0.55); font-size:15px; max-width:400px; line-height:1.7; }
        a {
            display:inline-flex; align-items:center; gap:10px;
            margin-top:40px; padding:16px 38px;
            background:#c51b1b; color:#fff; text-decoration:none;
            border-radius:100px; font-size:13px;
            text-transform:uppercase; letter-spacing:3px; font-weight:600;
            transition:all 0.3s;
        }
        a:hover { background:#ea2b2b; transform:translateY(-3px); }
    </style>
</head>
<body>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or may have been moved. Return to our homepage to continue exploring.</p>
    <a href="/">← Return Home</a>
</body>
</html>
